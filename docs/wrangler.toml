"$schema" = "../node_modules/wrangler/config-schema.json"

# Cloudflare Worker static-assets deployment for the simdra docs site.
#
# Production URL: https://bynarek.com/simdra/
#
# How this works:
#   - VitePress builds to `.vitepress/dist/` (base: '/simdra/' is set in
#     `.vitepress/config.mts` so every asset URL is prefixed correctly).
#   - Wrangler uploads `.vitepress/dist/` as a Worker static-assets
#     bundle (the modern replacement for Cloudflare Pages for new
#     deploys — same edge network, simpler deploy story).
#   - The route claims `bynarek.com/simdra/*`; requests outside that
#     prefix fall through to whatever else is bound on the zone.
#
# Build + deploy from the project root:
#   npm run docs:build      # writes docs/.vitepress/dist/
#   npm run docs:deploy     # uploads + activates the route
#
# Or directly from this dir:
#   cd docs && wrangler deploy

name = "simdra-docs-website"
compatibility_date = "2026-04-06"

[assets]
directory = ".vitepress/dist"
not_found_handling = "404-page"

# Route the Worker on the bynarek.com zone under the /simdra/ prefix.
# Remove this block to deploy under
# `simdra-docs-website.<account>.workers.dev` while testing.
[[routes]]
pattern = "bynarek.com/simdra/*"
zone_name = "bynarek.com"

[observability]
enabled = true