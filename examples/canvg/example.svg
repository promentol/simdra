      <rect x="-90"  y="-90"  width="180" height="180" stroke="rgba(96,165,250,0.45)" transform="rotate(24)"/>
      <rect x="-120" y="-120" width="240" height="240" stroke="rgba(96,165,250,0.30)" transform="rotate(32)"/>
