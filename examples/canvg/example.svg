  </g>

  <g fill="#a78bfa">
    <circle cx="140" cy="480" r="22"/>
    <circle cx="210" cy="480" r="22" fill="#f472b6"/>
    <circle cx="280" cy="480" r="22"/>
    <circle cx="350" cy="480" r="22" fill="#f472b6"/>
    <circle cx="420" cy="480" r="22"/>
